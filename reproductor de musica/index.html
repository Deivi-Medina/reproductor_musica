<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Glass - Inmersive Player</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div class="mesh-background"></div>

    <header class="global-header" id="globalHeader">
        <div class="search-container">
            <i data-lucide="search" class="search-icon"></i>
            <input type="text" id="globalSearch" placeholder="Buscar álbumes, artistas o canciones..." autocomplete="off">
        </div>
    </header>

    <main class="content-wrapper" id="mainLibrary">
        <section class="section-container">
            <h2 class="section-title">Tu Biblioteca</h2>
            <div class="album-grid" id="albumGrid">
                
                <article class="album-card" onclick="openAlbumView(0)">
                    <div class="card-media">
                        <img src="https://upload.wikimedia.org/wikipedia/en/3/3b/Dark_Side_of_the_Moon.png" alt="Dark Side of the Moon">
                        <div class="play-hint"><i data-lucide="play"></i></div>
                    </div>
                    <div class="card-info">
                        <h3>The Dark Side of the Moon</h3>
                        <p>Pink Floyd</p>
                    </div>
                </article>

                <article class="album-card" onclick="openAlbumView(1)">
                    <div class="card-media">
                        <img src="https://upload.wikimedia.org/wikipedia/en/9/9b/Tame_Impala_-_Currents.png" alt="Currents">
                        <div class="play-hint"><i data-lucide="play"></i></div>
                    </div>
                    <div class="card-info">
                        <h3>Currents</h3>
                        <p>Tame Impala</p>
                    </div>
                </article>

                <article class="album-card" onclick="openAlbumView(2)">
                    <div class="card-media">
                        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSshQdcG--1OpDBbvgkGDbICgjP2pIeMGhQ7g&s" alt="Teselia">
                        <div class="play-hint"><i data-lucide="play"></i></div>
                    </div>
                    <div class="card-info">
                        <h3>Teselia</h3>
                        <p>suei</p>
                    </div>
                </article>

                <article class="album-card" onclick="openAlbumView(3)">
                    <div class="card-media">
                        <img src="https://upload.wikimedia.org/wikipedia/en/0/04/Arctic_Monkeys_-_AM.png" alt="AM">
                        <div class="play-hint"><i data-lucide="play"></i></div>
                    </div>
                    <div class="card-info">
                        <h3>AM</h3>
                        <p>Arctic Monkeys</p>
                    </div>
                </article>

            </div>
        </section>
    </main>

    <main class="content-wrapper hidden" id="albumDetailView">
        <button class="back-btn" onclick="closeAlbumView()">
            <i data-lucide="arrow-left"></i> Volver a Biblioteca
        </button>
        
        <section class="album-header-detail">
            <img id="detailAlbumCover" src="" alt="Album Cover">
            <div class="album-header-text">
                <h1 id="detailAlbumTitle">Título del Álbum</h1>
                <p id="detailAlbumArtist">Artista</p>
            </div>
        </section>

        <section class="tracklist-container">
            <div class="tracklist-header">
                <span>#</span>
                <span>Título</span>
                <span><i data-lucide="clock"></i></span>
            </div>
            <div id="tracksDynamicList"></div>
        </section>
    </main>

    <div id="miniPlayer" class="mini-player hidden" onclick="expandFullPlayer()">
        <div class="mini-player-content">
            <img id="miniCover" src="" alt="Cover Mini">
            <div class="mini-metadata">
                <h4 id="miniTitle">Canción</h4>
                <p id="miniArtist">Artista</p>
            </div>
            <div class="mini-controls" onclick="event.stopPropagation()">
                <button class="btn-mini-play"><i data-lucide="play"></i></button>
            </div>
        </div>
        <div class="mini-progress-bar">
            <div id="miniProgressFill" class="mini-progress-fill"></div>
        </div>
    </div>

    <section id="playerOverlay" class="player-overlay hidden">
        <button class="minimize-btn" onclick="minimizeFullPlayer()">
            <i data-lucide="chevron-down"></i>
        </button>

        <div class="player-layout split-layout">
            
            <div class="player-visual">
                <div class="main-cover-wrapper">
                    <img id="currentCover" src="" alt="Album Art">
                </div>
            </div>

            <div class="player-controls-container">
                <div class="track-metadata">
                    <h1 id="currentTitle">Título de la canción</h1>
                    <p id="currentArtist">Nombre del Artista</p>
                </div>

                <div class="scrubber-container">
                    <input type="range" id="timelineScrubber" class="timeline-scrubber" min="0" max="100" value="0">
                    <div class="wave-progress-bar" id="waveContainer"></div>
                </div>

                <div class="time-stamps">
                    <span id="timeCurrent">0:00</span>
                    <span id="timeTotal">0:00</span>
                </div>

                <div class="main-controls">
                    <button id="btnShuffle" class="btn-icon"><i data-lucide="shuffle"></i></button>
                    <button id="btnPrev" class="btn-icon"><i data-lucide="skip-back"></i></button>
                    <button id="btnMainPlay" class="btn-play-large"><i data-lucide="play"></i></button>
                    <button id="btnNext" class="btn-icon"><i data-lucide="skip-forward"></i></button>
                    <button id="btnRepeat" class="btn-icon"><i data-lucide="repeat"></i></button>
                </div>

                <div class="volume-group">
                    <i data-lucide="volume-2" class="vol-icon"></i>
                    <div class="vol-slider-wrapper">
                        <input type="range" class="vol-slider" min="0" max="100" value="80">
                    </div>
                </div>
            </div>

            <div class="queue-sidebar">
                <div class="queue-panel">
                    <h3>A continuación</h3>
                    <div id="queueDynamicList" class="queue-list">
                        </div>
                </div>
            </div>

        </div>
    </section>

    <script>
        lucide.createIcons();
    </script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
